version: '3.8'

services:

  postgres:
    image: postgres:18
    container_name: telco_postgresql
    restart: unless-stopped
    environment:
      POSTGRES_DB: telco-lab
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - 5432:5432
    volumes:
      - volume-telco-pg:/var/lib/postgresql
    networks:
      - network-telco

  php:
    build: .
    container_name: telco_app
    restart: unless-stopped
    volumes:
      - ./telco-lab:/var/www/html
    networks:
      - network-telco
    depends_on:
      - postgres

  nginx:
    image: nginx:latest
    container_name: telco_nginx
    restart: unless-stopped
    ports:
      - 80:80
    volumes:
      - ./telco-lab:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - network-telco
    depends_on:
      - php

volumes:
  volume-telco-pg:

networks:
  network-telco:
